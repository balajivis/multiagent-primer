# DocVault Legacy — Application Configuration

spring.application.name=docvault-legacy

# Database Configuration
spring.datasource.url=jdbc:h2:mem:docvault;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console — disabled by default; enable only via env var for local dev
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Initialize database
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# Server config
server.port=8080

# CORS — override in production via environment variable
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# Email Configuration
mail.smtp.host=${MAIL_SMTP_HOST:smtp.sendgrid.net}
mail.smtp.port=${MAIL_SMTP_PORT:587}
mail.smtp.username=${MAIL_SMTP_USERNAME:apikey}
mail.smtp.password=${MAIL_SMTP_PASSWORD:}
mail.from=${MAIL_FROM:orders@docvault-legacy.com}

# Payment Gateway
payment.stripe.api_key=${STRIPE_API_KEY:}
payment.stripe.webhook_secret=${STRIPE_WEBHOOK_SECRET:}

# Logging
logging.level.root=WARN
logging.level.com.docvault=INFO
logging.level.org.hibernate.SQL=WARN
